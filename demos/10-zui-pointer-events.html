<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel API · ZUI Pointer Events</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }

    #viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      touch-action: none;
    }

    #surface {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      transform-origin: 0 0;
    }

    .world-box {
      position: absolute;
      width: 120px;
      height: 80px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      font-family: ui-sans-serif, system-ui, sans-serif;
      color: rgba(255,255,255,.9);
      cursor: grab;
      user-select: none;
      border: 1px solid rgba(255,255,255,.15);
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    .world-box:active { cursor: grabbing; }
    .world-box.dragging { opacity: .85; box-shadow: 0 8px 32px rgba(0,0,0,.6); }

    /* Grid lines to make pan/zoom visible */
    #surface::before {
      content: "";
      position: absolute;
      inset: -4000px;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 80px 80px;
    }
  </style>
</head>
<body>
  <div id="viewport">
    <div id="surface"></div>
  </div>

  <script type="module">
    import panel from "../index.js";
    import { PanelViewport, wireInteractions, wireZuiPointerEvents } from "../zui.js";

    // --- Build the viewport ---
    const viewport = new PanelViewport({
      root: document.getElementById("viewport"),
      surface: document.getElementById("surface")
    });
    // Exclude .world-box from ZUI pan so pointer-down on a box starts a drag,
    // not a pan. The default ignoreSelector is extended here.
    wireInteractions(viewport, {
      ignoreSelector: "dom-panel, button, a, [contenteditable], input, textarea, select, .world-box"
    });
    panel.attachViewport(viewport);

    // --- Wire corrected pointer events ---
    // wireZuiPointerEvents re-emits pointer events with world-space x/y in
    // event.detail. These are correct at any zoom level.
    const cleanupZuiEvents = wireZuiPointerEvents(viewport);

    // --- Create draggable world boxes ---
    const BOX_COLORS = [
      ["#3b4cca", "#6c7fe8"],
      ["#1a6b3c", "#2d9e5f"],
      ["#7c2d12", "#c2522b"],
      ["#4a1d96", "#7c3aed"],
    ];

    const boxes = [
      { id: "A", label: "Box A", x: 120, y: 120 },
      { id: "B", label: "Box B", x: 320, y: 200 },
      { id: "C", label: "Box C", x: 180, y: 340 },
      { id: "D", label: "Box D", x: 500, y: 130 },
    ];

    const surface = document.getElementById("surface");

    boxes.forEach(({ id, label, x, y }, i) => {
      const el = document.createElement("div");
      el.className = "world-box";
      el.id = `box-${id}`;
      el.dataset.boxId = id;
      el.textContent = label;
      const [bg, border] = BOX_COLORS[i % BOX_COLORS.length];
      el.style.cssText = `left:${x}px;top:${y}px;background:${bg};border-color:${border}`;
      surface.appendChild(el);
    });

    // --- Drag logic using zuipointerdown / zuipointermove / zuipointerup ---
    //
    // event.detail.x / .y are world coordinates — correct at any zoom level.
    // Compare: if you used event.clientX/Y directly, dragging would be wrong
    // when zoomed in or out because those are screen coordinates.

    const root = document.getElementById("viewport");

    root.addEventListener("zuipointerdown", e => {
      const box = e.detail.original.target.closest(".world-box");
      if (!box) return;

      box.classList.add("dragging");

      const startWorld = { x: e.detail.x, y: e.detail.y };
      const startBox   = { x: parseFloat(box.style.left), y: parseFloat(box.style.top) };
      const id         = e.detail.pointerId;

      const ctrl = new AbortController();

      root.addEventListener("zuipointermove", m => {
        if (m.detail.pointerId !== id) return;
        box.style.left = (startBox.x + m.detail.x - startWorld.x) + "px";
        box.style.top  = (startBox.y + m.detail.y - startWorld.y) + "px";
        updateCoords(m.detail.x, m.detail.y);
      }, { signal: ctrl.signal });

      const end = () => { box.classList.remove("dragging"); ctrl.abort(); };
      root.addEventListener("zuipointerup",     end, { signal: ctrl.signal });
      root.addEventListener("zuipointercancel", end, { signal: ctrl.signal });
    });

    // --- Coordinate info panel ---
    const coordHandle = panel.open("", "Pointer Events", {
      width: 280, height: 220, left: 20, top: 20,
      plugins: ["focusable", "stackable", "draggable", "closable", "rounded", "titled"]
    });

    const coordEl = document.createElement("div");
    coordEl.style.cssText = "font-family:monospace;font-size:12px;line-height:2";
    coordEl.innerHTML = `
      <div style="color:#aaa;margin-bottom:8px">
        Drag boxes — they follow the pointer correctly at any zoom level.
        Scroll to zoom, drag background to pan.
      </div>
      <div id="ci-screen">Screen  <b>—</b></div>
      <div id="ci-world">World   <b>—</b></div>
      <div id="ci-zoom">Zoom    <b>1.000</b></div>
    `;
    coordHandle.setContent(coordEl);

    function updateCoords(wx, wy) {
      document.getElementById("ci-world").innerHTML =
        `World   <b>${wx.toFixed(1)}, ${wy.toFixed(1)}</b>`;
    }

    root.addEventListener("zuipointermove", e => {
      const o = e.detail.original;
      document.getElementById("ci-screen").innerHTML =
        `Screen  <b>${o.clientX.toFixed(0)}, ${o.clientY.toFixed(0)}</b>`;
      document.getElementById("ci-world").innerHTML =
        `World   <b>${e.detail.x.toFixed(1)}, ${e.detail.y.toFixed(1)}</b>`;
    });

    window.addEventListener("viewportchange", e => {
      document.getElementById("ci-zoom").innerHTML =
        `Zoom    <b>${e.detail.zoom.toFixed(3)}</b>`;
    });

    // Back link panel
    const backHandle = panel.open("", "", {
      width: 200, height: 52, left: 20, top: window.innerHeight - 72,
      minWidth: "auto",
      plugins: ["focusable", "stackable", "draggable", "rounded", "captionless"]
    });
    backHandle.setHTML(`<a href="./index.html" class="text-decoration-none small"><i class="bi bi-chevron-left"></i> back to demos</a>`);
  </script>
</body>
</html>
