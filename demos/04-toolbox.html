<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel API · Toolbox</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    .toolbox-grid {
      display: grid;
      grid-template-columns: repeat(2, 48px);
      grid-template-rows: repeat(6, 48px);
      gap: 10px;
    }
    .tool-button {
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      color: rgba(244,246,255,.82);
      font-size: 19px;
      cursor: pointer;
    }
    .tool-button:hover, .tool-button:focus-visible {
      background: rgba(122,162,255,.18);
      color: white;
      outline: 2px solid rgba(122,162,255,.42);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <main class="container py-5">
    <a href="./index.html" class="text-decoration-none small"><i class="bi bi-chevron-left"></i> back</a>
    <h1 class="display-6 mb-3 mt-3">Toolbox</h1>
    <p class="text-secondary">A borderless, vertical panel for a grid of tools. The panel has <code>role="toolbar"</code> for accessibility.</p>
    <button id="openToolbox" class="btn btn-primary"><i class="bi bi-tools"></i> Open toolbox</button>
  </main>

  <script type="module">
    import panel from "../index.js";

    function openToolbox() {
      const handle = panel.open("", "Toolbox", {
        width: 140,
        height: 400,
        left: 40,
        top: 80,
        radius: 22,
        role: "toolbar",
        plugins: ["focusable", "stackable", "draggable", "closable", "miniaturizable", "pinnable", "rounded", "borderless", "titled", "escapable"]
      });

      const grid = document.createElement("div");
      grid.className = "toolbox-grid";
      const tools = [
        ["bi-cursor", "Select"], ["bi-bounding-box", "Frame"],
        ["bi-vector-pen", "Pen"], ["bi-textarea-t", "Text"],
        ["bi-image", "Image"], ["bi-grid-3x3-gap", "Grid"],
        ["bi-bezier2", "Path"], ["bi-palette", "Style"],
        ["bi-link-45deg", "Link"], ["bi-code-slash", "Code"],
        ["bi-magnet", "Snap"], ["bi-gear", "Settings"]
      ];
      for (const [icon, label] of tools) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "tool-button";
        button.title = label;
        button.setAttribute("aria-label", label);
        button.innerHTML = `<i class="bi ${icon}"></i>`;
        button.addEventListener("click", () => console.log("tool:", label));
        grid.appendChild(button);
      }
      handle.setContent(grid);
      return handle;
    }

    document.getElementById("openToolbox").addEventListener("click", openToolbox);
    openToolbox();
  </script>
</body>
</html>
