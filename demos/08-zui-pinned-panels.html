<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel API · Pinned panels</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    body { margin: 0; overflow: hidden; }
    .app-viewport {
      position: fixed; inset: 0;
      overflow: hidden;
      container-type: size;
      touch-action: none;
      isolation: isolate;
      background: radial-gradient(circle at 30% 20%, #1f0e4a, #050217);
    }
    .app-surface {
      position: absolute;
      left: 0; top: 0;
      width: 100cqw; min-width: 2200px;
      height: 100cqh; min-height: 1400px;
      transform-origin: 0 0;
      will-change: transform;
    }
    .node {
      position: absolute;
      width: 200px; padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: white;
    }
    .controls {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 30;
    }
    .hint {
      position: fixed;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,.6);
      color: rgba(255,255,255,.8);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main id="root" class="app-viewport">
    <div id="surface" class="app-surface">
      <div class="node" style="left: 200px; top: 200px;">Node A · World point (200, 200)</div>
      <div class="node" style="left: 800px; top: 500px;">Node B · World point (800, 500)</div>
      <div class="node" style="left: 1400px; top: 240px;">Node C · World point (1400, 240)</div>
    </div>
  </main>

  <div class="controls btn-group">
    <a href="./index.html" class="btn btn-dark btn-sm"><i class="bi bi-chevron-left"></i></a>
    <button id="reset" class="btn btn-dark btn-sm" title="Reset"><i class="bi bi-aspect-ratio"></i></button>
    <button id="openA" class="btn btn-primary btn-sm">Note on A</button>
    <button id="openB" class="btn btn-primary btn-sm">Note on B</button>
    <button id="openC" class="btn btn-primary btn-sm">Note on C</button>
  </div>

  <div class="hint">Drag the background to pan, scroll wheel to zoom. Click the <i class="bi bi-pin-angle"></i> button on a panel to pin/unpin it from the world.</div>

  <script type="module">
    import panel from "../index.js";
    import { PanelViewport, wireInteractions } from "../zui.js";

    const viewport = new PanelViewport({
      root: document.getElementById("root"),
      surface: document.getElementById("surface")
    });
    wireInteractions(viewport);
    panel.attachViewport(viewport);

    document.getElementById("reset").addEventListener("click", () => viewport.reset());

    function openNoteAt(label, worldX, worldY) {
      // Convert world coords → screen so the panel opens at the right place,
      // then toggle the pin so it follows the world from then on.
      const screen = viewport.worldToScreen(worldX, worldY);
      const handle = panel.open("", label, { width: 240, height: 180, left: screen.x, top: screen.y });
      handle.setHTML(`<p>Pinned to world point (${worldX}, ${worldY}).</p><p class="text-secondary small">Pan/zoom and watch me follow.</p>`);
      // Programmatically pin by clicking the pin action.
      handle.actions.querySelector("[data-pin]").click();
      return handle;
    }

    document.getElementById("openA").addEventListener("click", () => openNoteAt("Node A", 200, 200));
    document.getElementById("openB").addEventListener("click", () => openNoteAt("Node B", 800, 500));
    document.getElementById("openC").addEventListener("click", () => openNoteAt("Node C", 1400, 240));

    openNoteAt("Node A", 200, 200);
  </script>
</body>
</html>
